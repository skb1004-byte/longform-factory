version: '3.9'

services:
  ffmpeg-worker:
    build: .
    container_name: lf_ffmpeg_worker
    ports:
      - "8002:8002"
    environment:
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - PIXABAY_API_KEY=${PIXABAY_API_KEY}
      - LF_API_KEY=${LF_API_KEY}
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data/jobs:/data/jobs
      - ./data/tmp:/data/tmp
      - ./data/output:/data/output
      - ./data/bgm:/data/bgm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - longform-network

networks:
  longform-network:
    driver: bridge
