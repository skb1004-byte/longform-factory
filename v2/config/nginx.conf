worker_processes auto;
events { worker_connections 1024; }

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    upstream n8n_backend      { server n8n:5678; keepalive 32; }
    upstream ffmpeg_backend   { server ffmpeg-worker:8002; }
    upstream tts_backend      { server tts:8001; }
    upstream uploader_backend { server uploader:8003; }
    upstream mcp_backend      { server ai-mcp:8010; }

    server {
        listen 80;
        server_name _;
        client_max_body_size 2G;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        location /n8n/ {
            proxy_pass http://n8n_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Origin http://localhost:8080;
            proxy_set_header Host lf2_n8n:5678;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_redirect http://n8n:5678/ /n8n/;
        }

        location /api/ffmpeg/ {
            proxy_pass http://ffmpeg_backend/;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location /api/tts/ {
            proxy_pass http://tts_backend/;
            proxy_set_header Host $host;
        }

        location /api/upload/ {
            proxy_pass http://uploader_backend/;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        location /api/mcp/ {
            proxy_pass http://mcp_backend/;
            proxy_set_header Host $host;
        }

        location / {
            return 301 /n8n/;
        }
    }
}